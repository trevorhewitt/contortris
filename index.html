<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- Disable zoom + keep viewport stable -->
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Extris</title>

  <style>
    @font-face{
      font-family: "PressStart2P";
      src: url("./fonts/PressStart2P-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }
  
    :root{
      --bg: #0f1020;
      --bg2: #070714;
  
      --text: rgba(245,245,255,0.92);
      --muted: rgba(245,245,255,0.70);
  
      /* Natural board geometry (used for fit calculations) */
      --cols: 14;
      --rows: 28;
      --cell: 18px;
      --natural-board-w: calc(var(--cols) * var(--cell));
      --natural-board-h: calc(var(--rows) * var(--cell));
  
      /* Bottom bar fixed height (plus safe-area inset) */
      --bottom-bar-h: 96px;
  
      /* Contrast */
      --grid: rgba(230,230,245,0.22);
      --boardEdge: rgba(245,245,255,0.26);
      --boardEdgeInner: rgba(245,245,255,0.10);
  
      /* Typography */
      --font-body: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      --font-display: "PressStart2P", ui-monospace, monospace;
      --font-numbers: "PressStart2P", ui-monospace, monospace;
  
      /* Retro styling controls */
      --ui-radius: 0px;
      --ui-border: rgba(255,255,255,0.18);
      --ui-panel-bg: rgba(8,8,16,0.84);
  
      /* Glow / RGB controls */
      --display-glow-a: 0.24;
      --display-glow-b: 0.14;
      --display-rgb-shift: 2px;
      --display-rgb-a1: 0.22;
      --display-rgb-a2: 0.18;
      --display-rgb-a3: 0.18;
      --display-rgb-a4: 0.14;
  
      --name-glow-a: 0.35;
      --name-glow-b: 0.22;
      --name-rgb-shift: 2px;
      --name-rgb-a1: 0.22;
      --name-rgb-a2: 0.18;
    }
  
    html,
    body{
      height: 100%;
      width: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      background: radial-gradient(1200px 900px at 30% 10%, #2a2550 0%, var(--bg) 45%, var(--bg2) 100%);
      color: var(--text);
      font-family: var(--font-body);
    }
  
    .app{
      width: 100vw;
      height: 100dvh;
      display: grid;
      grid-template-rows: 1fr calc(var(--bottom-bar-h) + env(safe-area-inset-bottom));
      box-sizing: border-box;
      align-items: stretch;
      justify-items: center;
    }
  
    .boardRegion{
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      box-sizing: border-box;
      padding: 8px;
      min-height: 0;
    }
  
    .boardShell{
      position: relative;
      background: #000;
      overflow: hidden;
      box-shadow:
        0 18px 60px rgba(0,0,0,0.55),
        0 0 0 2px var(--boardEdge),
        0 0 0 1px var(--boardEdgeInner) inset,
        -6px 0 18px rgba(255,220,90,0.12),
        6px 0 18px rgba(90,200,255,0.12),
        0 -6px 18px rgba(110,255,140,0.10),
        0 6px 18px rgba(255,90,90,0.10);
      width: var(--natural-board-w);
      height: var(--natural-board-h);
    }
  
    canvas{
      width: var(--natural-board-w);
      height: var(--natural-board-h);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
  
    .nameLayer{
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 1;
      mix-blend-mode: screen;
      filter:
        drop-shadow(0 0 10px rgba(123,247,255,0.35))
        drop-shadow(0 0 34px rgba(255,80,220,0.22));
    }
  
    .nameText{
      position: absolute;
      left: 0;
      right: 0;
      top: 42px;
      width: 100%;
      padding: 0 10px;
      box-sizing: border-box;
      font-family: var(--font-display);
      font-size: 18px;
      line-height: 1.5;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: rgba(245,245,255,0.68);
      text-align: center;
      text-transform: uppercase;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      overflow: hidden;
      text-overflow: clip;
      user-select: none;
      text-shadow:
        var(--name-rgb-shift) 0 0 rgba(255,0,140,var(--name-rgb-a1)),
        calc(var(--name-rgb-shift) * -1) 0 0 rgba(0,255,255,var(--name-rgb-a2)),
        0 0 10px rgba(180,180,255,var(--name-glow-a)),
        0 0 22px rgba(255,80,220,var(--name-glow-b));
      image-rendering: pixelated;
      transform: translateX(0);
      opacity: 1;
      transition: transform 260ms steps(6, end), opacity 180ms linear;
    }
  
    .nameText.enterFromRight{ transform: translateX(110%); opacity: 0; }
    .nameText.enterToCenter{ transform: translateX(0); opacity: 1; }
    .nameText.exitToLeft{ transform: translateX(-120%); opacity: 0; }
  
    .overlay{
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(0,0,0,0.70), rgba(0,0,0,0.70)),
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.03) 0px,
          rgba(255,255,255,0.03) 1px,
          transparent 1px,
          transparent 4px
        );
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms linear;
    }
  
    .overlay.show{
      opacity: 1;
      pointer-events: auto;
    }
  
    .overlay .msg{
      padding: 18px;
      border-radius: var(--ui-radius);
      background: var(--ui-panel-bg);
      border: 2px solid var(--ui-border);
      box-shadow:
        0 0 0 2px rgba(0,0,0,0.85) inset,
        0 18px 60px rgba(0,0,0,0.55),
        0 0 18px rgba(120,180,255,0.08);
      text-align: center;
      max-width: min(560px, calc(100vw - 24px));
    }
  
    .overlay .msg .big{
      font-family: var(--font-display);
      font-size: 18px;
      line-height: 1.6;
      font-weight: 400;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      text-transform: uppercase;
      color: rgba(245,245,255,0.94);
      text-shadow:
        var(--display-rgb-shift) 0 0 rgba(255,0,140,var(--display-rgb-a1)),
        calc(var(--display-rgb-shift) * -1) 0 0 rgba(0,255,255,var(--display-rgb-a2)),
        0 0 10px rgba(123,247,255,var(--display-glow-a)),
        0 0 24px rgba(255,80,220,var(--display-glow-b));
    }
  
    .overlay .msg .small{
      font-family: var(--font-body);
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }
  
    .controlsBlock{
      margin-top: 12px;
      text-align: left;
      padding: 12px 14px;
      border-radius: var(--ui-radius);
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.10);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.55) inset;
    }
  
    .controlsHeader{
      font-family: var(--font-display);
      font-size: 10px;
      line-height: 1.5;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      text-transform: uppercase;
      color: rgba(245,245,255,0.92);
    }
  
    .controlsText{
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }
  
    .overlayBtns{
      display: flex;
      gap: 10px;
      margin-top: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  
    button{
    appearance: none;
    -webkit-appearance: none;
    border: 2px solid rgba(255,255,255,0.18);
    border-radius: 0;
    padding: 12px 14px;
    min-height: 44px;

    color: rgba(245,245,255,0.96);
    background: rgba(34, 38, 68, 0.96);

    box-shadow:
      0 0 0 2px rgba(0,0,0,0.88),
      0 0 0 4px rgba(255,255,255,0.05),
      0 0 10px rgba(123,247,255,0.14),
      0 0 24px rgba(255,80,220,0.10);

    font-family: var(--font-display);
    font-size: 10px;
    line-height: 1.4;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;

    cursor: pointer;
    image-rendering: pixelated;
    user-select: none;

    text-shadow:
      1px 0 0 rgba(255,0,140,0.14),
      -1px 0 0 rgba(0,255,255,0.10),
      0 0 8px rgba(123,247,255,var(--display-glow-a));

    transition:
      background-color 120ms linear,
      border-color 120ms linear,
      box-shadow 120ms linear,
      color 120ms linear,
      opacity 120ms linear,
      transform 80ms steps(2, end);
    }

    button:hover{
      background: rgba(44, 50, 90, 0.98);
      border-color: rgba(255,255,255,0.30);
      box-shadow:
        0 0 0 2px rgba(0,0,0,0.92),
        0 0 0 4px rgba(255,255,255,0.07),
        0 0 14px rgba(123,247,255,0.24),
        0 0 30px rgba(255,80,220,0.16);
    }

    button:active{
      transform: translateY(1px);
      background: rgba(28, 32, 58, 0.98);
      border-color: rgba(255,255,255,0.22);
      box-shadow:
        0 0 0 2px rgba(0,0,0,0.94),
        0 0 0 4px rgba(255,255,255,0.04),
        0 0 8px rgba(123,247,255,0.10),
        0 0 18px rgba(255,80,220,0.08);
    }

    button:focus-visible{
      outline: none;
      box-shadow:
        0 0 0 2px rgba(0,0,0,0.94),
        0 0 0 4px rgba(255,255,255,0.08),
        0 0 0 6px rgba(123,247,255,0.45),
        0 0 18px rgba(123,247,255,0.24),
        0 0 34px rgba(255,80,220,0.14);
    }

    button.secondary{
      background: rgba(22, 24, 38, 0.96);
      border-color: rgba(255,255,255,0.14);
      color: rgba(245,245,255,0.88);
      box-shadow:
        0 0 0 2px rgba(0,0,0,0.90),
        0 0 0 4px rgba(255,255,255,0.04),
        0 0 8px rgba(123,247,255,0.08);
    }

    button.secondary:hover{
      background: rgba(30, 34, 52, 0.98);
      border-color: rgba(255,255,255,0.24);
      box-shadow:
        0 0 0 2px rgba(0,0,0,0.92),
        0 0 0 4px rgba(255,255,255,0.06),
        0 0 12px rgba(123,247,255,0.16);
    }
    .bottomBar{
      width: min(100vw, calc(var(--natural-board-w) * 2));
      height: var(--bottom-bar-h);
      padding: 8px 10px calc(10px + env(safe-area-inset-bottom)) 10px;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      justify-self: center;
      background: rgba(0,0,0,0.30);
      border-top: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }
  
    .bottomLeft{
      display: flex;
      justify-content: flex-start;
    }
  
    .bottomCenter{
      display: flex;
      justify-content: center;
    }
  
    .bottomRight{
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
  
    .nextMiniShell{
      width: 110px;
      height: 74px;
      background: radial-gradient(180px 120px at 35% 25%, rgba(123,247,255,0.10), rgba(0,0,0,0.55));
      border: 1px solid rgba(255,255,255,0.10);
      overflow: hidden;
      position: relative;
    }
  
    #nextCanvas{
      width: 110px;
      height: 74px;
      display: block;
      image-rendering: pixelated;
    }
  
    .statsMini{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: center;
    }
  
    .pauseBtn{
      width: 62px;
      height: 62px;
      border-radius: var(--ui-radius);
      padding: 0;
      display: grid;
      place-items: center;
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 14px;
      line-height: 1;
      user-select: none;
    }
  
    .statPill{
      width: 118px;
      min-height: 58px;
      padding: 8px;
      border-radius: var(--ui-radius);
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.10);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.55) inset;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 0;
    }
  
    .statPill .k{
      font-family: var(--font-display);
      font-size: 8px;
      line-height: 1.4;
      color: var(--muted);
      white-space: nowrap;
      text-transform: uppercase;
      text-align: center;
    }
  
    .statPill .v{
      font-family: var(--font-numbers);
      font-size: 12px;
      line-height: 1.4;
      font-weight: 400;
      letter-spacing: 0.04em;
      white-space: nowrap;
      text-align: center;
      color: rgba(245,245,255,0.96);
      text-shadow:
        var(--display-rgb-shift) 0 0 rgba(255,0,140,var(--display-rgb-a4)),
        calc(var(--display-rgb-shift) * -1) 0 0 rgba(0,255,255,0.10),
        0 0 8px rgba(123,247,255,var(--display-glow-a));
    }
  
    .debugPanel{
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(0,0,0,0.40);
      border: 1px solid rgba(255,255,255,0.10);
      font-size: 12px;
      color: var(--muted);
      pointer-events: none;
      display: none;
    }
  
    .debugPanel .k{
      color: rgba(245,245,255,0.70);
      display: inline-block;
      width: 140px;
    }
  
    .debugPanel .v{
      color: rgba(245,245,255,0.95);
      font-weight: 900;
    }
  
    #boardShell.glow-left{
      box-shadow:
        0 18px 60px rgba(0,0,0,0.55),
        0 0 0 2px var(--boardEdge),
        0 0 0 1px var(--boardEdgeInner) inset,
        -6px 0 18px rgba(255,220,90,0.12),
        6px 0 18px rgba(90,200,255,0.12),
        0 -6px 18px rgba(110,255,140,0.10),
        0 6px 18px rgba(255,90,90,0.10),
        -10px 0 30px rgba(255,220,90,0.45),
        -3px 0 0 rgba(255,220,90,0.90) inset;
    }
  
    #boardShell.glow-right{
      box-shadow:
        0 18px 60px rgba(0,0,0,0.55),
        0 0 0 2px var(--boardEdge),
        0 0 0 1px var(--boardEdgeInner) inset,
        -6px 0 18px rgba(255,220,90,0.12),
        6px 0 18px rgba(90,200,255,0.12),
        0 -6px 18px rgba(110,255,140,0.10),
        0 6px 18px rgba(255,90,90,0.10),
        10px 0 30px rgba(90,200,255,0.45),
        3px 0 0 rgba(90,200,255,0.90) inset;
    }
  
    #boardShell.glow-top{
      box-shadow:
        0 18px 60px rgba(0,0,0,0.55),
        0 0 0 2px var(--boardEdge),
        0 0 0 1px var(--boardEdgeInner) inset,
        -6px 0 18px rgba(255,220,90,0.12),
        6px 0 18px rgba(90,200,255,0.12),
        0 -6px 18px rgba(110,255,140,0.10),
        0 6px 18px rgba(255,90,90,0.10),
        0 -10px 30px rgba(110,255,140,0.40),
        0 3px 0 rgba(110,255,140,0.90) inset;
    }
  
    #boardShell.glow-bottom{
      box-shadow:
        0 18px 60px rgba(0,0,0,0.55),
        0 0 0 2px var(--boardEdge),
        0 0 0 1px var(--boardEdgeInner) inset,
        -6px 0 18px rgba(255,220,90,0.12),
        6px 0 18px rgba(90,200,255,0.12),
        0 -6px 18px rgba(110,255,140,0.10),
        0 6px 18px rgba(255,90,90,0.10),
        0 10px 30px rgba(255,90,90,0.40),
        0 -3px 0 rgba(255,90,90,0.90) inset;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="boardRegion">
      <div class="boardShell" id="boardShell">
        <div id="nameLayer" class="nameLayer"></div>
        <canvas id="boardCanvas"></canvas>

        <div id="overlay" class="overlay show">
          <div class="msg">
            <div class="big" id="overlayTitle">Loading…</div>
            <div class="small" id="overlaySubtitle"></div>

            <div class="controlsBlock" id="controlsBlock" style="display:none;">
              <div class="controlsHeader">Controls</div>
              <div class="controlsText">
                Swipe or tap left to move left. <br>
                Swipe or tap right to move right. <br>
                Tap the top to rotate. <br>
                Tap the bottom to move the piece down.
                <small>[Extris alpha version 20250306 copyright 2026 geometrixgamestudio@gmail.com]</small>
              </div>
            </div>

            <div class="overlayBtns" id="overlayBtns" style="display:none;">
              <button id="overlayPlayBtn">Play</button>
              <button id="overlayResumeBtn" class="secondary">Resume</button>
              <button id="overlayNewBtn" class="secondary">New game</button>
            </div>
          </div>
        </div>

        <div id="debugPanel" class="debugPanel">
          <div><span class="k">Zone</span> <span id="dbgZone" class="v">normal</span></div>
          <div><span class="k">Piece difficulty</span> <span id="dbgPieceDiff" class="v">–</span></div>
          <div><span class="k">Base fall speed</span> <span id="dbgBaseSpeed" class="v">–</span></div>
        </div>
      </div>
    </div>

    <div class="bottomBar">
      <div class="bottomLeft">
        <div class="nextMiniShell" aria-label="Next shape">
          <canvas id="nextCanvas"></canvas>
        </div>
      </div>
    
      <div class="bottomCenter">
        <button id="pauseBtn" class="pauseBtn" aria-label="Pause/Play">▶</button>
      </div>
    
      <div class="bottomRight">
        <div class="statPill">
          <div class="k">Score</div>
          <div class="v" id="scoreText">0</div>
        </div>
        <div class="statPill">
          <div class="k">Blocks destroyed</div>
          <div class="v" id="linesText">0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Fit-to-viewport script: uses VisualViewport so the bottom bar never gets cut off.
       Also sizes the board to use ALL available space above the bottom bar. -->
  <script>
    (function(){
      const shell = document.getElementById("boardShell");
      const boardCanvas = document.getElementById("boardCanvas");
      const bottomBar = document.querySelector(".bottomBar");

      const NAT_W = 14 * 18; // must match --cols * --cell
      const NAT_H = 28 * 18; // must match --rows * --cell

      function viewportSize(){
        if (window.visualViewport) {
          return { w: window.visualViewport.width, h: window.visualViewport.height };
        }
        return { w: window.innerWidth, h: window.innerHeight };
      }

      function fit(){
        const vp = viewportSize();
        const bb = bottomBar.getBoundingClientRect();

        // Space available to boardRegion content:
        // full viewport height minus bottom bar *actual* height
        const availW = vp.w - 16; // boardRegion padding + breathing room
        const availH = (vp.h - bb.height) - 16; // boardRegion padding + breathing room

        // Uniform scale
        const scale = Math.min(availW / NAT_W, availH / NAT_H);

        // Guard against tiny sizes
        const s = Math.max(0.1, scale);

        const scaledW = Math.floor(NAT_W * s);
        const scaledH = Math.floor(NAT_H * s);

        shell.style.width = scaledW + "px";
        shell.style.height = scaledH + "px";
        boardCanvas.style.width = scaledW + "px";
        boardCanvas.style.height = scaledH + "px";
      }

      // Prevent browser from handling touch scroll/zoom gestures anywhere
      document.addEventListener("touchmove", (e) => e.preventDefault(), { passive: false });

      window.addEventListener("resize", fit, { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", fit, { passive: true });
        window.visualViewport.addEventListener("scroll", fit, { passive: true });
      }
      window.addEventListener("orientationchange", fit, { passive: true });

      // Initial fit after layout settles
      requestAnimationFrame(() => requestAnimationFrame(fit));
    })();
  </script>

  <script type="module" src="./main.js"></script>
</body>
</html>
